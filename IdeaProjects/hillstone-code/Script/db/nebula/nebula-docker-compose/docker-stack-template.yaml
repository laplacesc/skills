  storaged0:
    image: vesoft/nebula-storaged:${NEBULA_TAG}
    environment:
      TZ: "${TZ}"
      USER: "${USER}"
    command:
      - --meta_server_addrs=${NODE1_IP}:9559,${NODE2_IP}:9559,${NODE3_IP}:9559
