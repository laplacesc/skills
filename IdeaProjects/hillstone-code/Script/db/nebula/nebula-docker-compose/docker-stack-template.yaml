version: '3.8'
services:
  metad0:
    image: vesoft/nebula-metad:${NEBULA_TAG}
    environment:
      TZ: "${TZ}"
      USER: "${USER}"
    command:
      - --meta_server_addrs=${NODE1_IP}:9559,${NODE2_IP}:9559,${NODE3_IP}:9559
      - --local_ip=${NODE1_IP}
      - --ws_ip=${NODE1_IP}
      - --port=9559
      - --data_path=/data/meta
      - --log_dir=/logs
      - --v=0
      - --minloglevel=2
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.hostname == ${NODE1_NAME}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://${NODE1_IP}:19559/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    ports:
      - target: 9559
        published: 9559
        protocol: tcp
        mode: host
      - target: 19559
        published: 19559
        protocol: tcp
        mode: host
    volumes:
      - data-metad0:/data/meta
      - logs-metad0:/logs
    networks:
      - nebula-net

  metad1:
    image: vesoft/nebula-metad:${NEBULA_TAG}
    environment:
      TZ: "${TZ}"
      USER: "${USER}"
    command:
      - --meta_server_addrs=${NODE1_IP}:9559,${NODE2_IP}:9559,${NODE3_IP}:9559
      - --local_ip=${NODE2_IP}
      - --ws_ip=${NODE2_IP}
      - --port=9559
      - --data_path=/data/meta
